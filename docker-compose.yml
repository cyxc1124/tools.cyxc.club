services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - ./deploy/nginx-docker-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api

  frontend:
    build: ./web
    expose:
      - "80"

  api:
    build:
      context: ./services
      dockerfile: api/Dockerfile
    expose:
      - "8080"

  # 本地开发请用根目录 npm run dev（API 协调服务 + Vite）
  # 或 docker compose up 后访问 http://localhost:8081
