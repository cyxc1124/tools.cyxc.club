{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tools.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tools.frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tools.frontend.selectorLabels" . | nindent 4 }}
{{- end }}
