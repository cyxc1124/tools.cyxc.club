{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "tools.fullname" . }}-http
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tools.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    {{- if .Values.api.enabled }}
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.api.pathPrefix }}`)
      kind: Rule
      priority: 10
      services:
        - name: {{ include "tools.fullname" . }}-api
          port: {{ .Values.api.service.port }}
    {{- end }}
    {{- if .Values.frontend.enabled }}
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      priority: 1
      services:
        - name: {{ include "tools.fullname" . }}-frontend
          port: {{ .Values.frontend.service.port }}
    {{- end }}
{{- end }}
