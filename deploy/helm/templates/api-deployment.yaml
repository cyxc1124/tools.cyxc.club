{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tools.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tools.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tools.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tools.api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ include "tools.imageTag" (dict "tag" .Values.api.image.tag "defaultTag" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.api.probes.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.api.probes.periodSeconds | default 20 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.api.probes.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.api.probes.periodSeconds | default 10 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
