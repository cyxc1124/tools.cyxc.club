{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tools.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tools.api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tools.api.selectorLabels" . | nindent 4 }}
{{- end }}
