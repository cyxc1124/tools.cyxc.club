# Dependabot 依赖更新配置
# 文档: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # 前端
  - package-ecosystem: npm
    directory: /web
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: deps
      prefix-development: deps
      include: scope

  # API 协调服务
  - package-ecosystem: pip
    directory: /services/api
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      pip-api-minor-patch:
        patterns: ["*"]
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - python
    commit-message:
      prefix: deps
      prefix-development: deps
      include: scope

  # 共享 Python 库
  - package-ecosystem: pip
    directory: /services/common
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      pip-common-minor-patch:
        patterns: ["*"]
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - python
    commit-message:
      prefix: deps
      prefix-development: deps
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps
      include: scope

  # Docker 基础镜像（前端）
  - package-ecosystem: docker
    directory: /web
    target-branch: develop
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: deps
      include: scope

  # Docker 基础镜像（API）
  - package-ecosystem: docker
    directory: /services/api
    target-branch: develop
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: deps
      include: scope
