name: Build and Push to GHCR

# 触发：
# - push 到 develop：构建并推送 :develop + :sha-xxxx
# - push 到 main：构建并推送 :latest + :main + :sha-xxxx
# - push 到 v* tag：构建并推送 :v1.2.3 + :sha-xxxx
# - PR 到 develop / main：仅 CI 构建验证（不推送）
# - workflow_dispatch：构建并推送（手动触发）
on:
  push:
    branches:
      - develop
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build ${{ matrix.image }} image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tools-web
            context: ./web
            dockerfile: ./web/Dockerfile
          - image: tools-api
            context: ./services
            dockerfile: ./services/api/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute build metadata
        id: build_meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            GIT_TAG="${GITHUB_REF#refs/tags/}"
            GIT_BRANCH=""
          elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            GIT_TAG=""
            GIT_BRANCH="${GITHUB_REF#refs/heads/}"
          else
            GIT_TAG=""
            GIT_BRANCH=""
          fi
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          {
            echo "git-tag=${GIT_TAG}"
            echo "git-commit=${GITHUB_SHA}"
            echo "git-branch=${GIT_BRANCH}"
            echo "build-time=${BUILD_TIME}"
            echo "build-number=${{ github.run_number }}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha,format=short

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Build summary
        if: always()
        run: |
          {
            echo "## ${{ matrix.image }} 镜像构建"
            echo ""
            echo "- **触发事件**: ${{ github.event_name }}"
            echo "- **是否推送**: ${{ github.event_name != 'pull_request' }}"
            echo "- **git tag**: \`${{ steps.build_meta.outputs.git-tag }}\`"
            echo "- **git branch**: \`${{ steps.build_meta.outputs.git-branch }}\`"
            echo "- **commit**: \`${{ github.sha }}\`"
            echo "- **build time**: \`${{ steps.build_meta.outputs.build-time }}\`"
            echo "- **build number**: \`${{ steps.build_meta.outputs.build-number }}\`"
            echo ""
            echo "### Tags"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
