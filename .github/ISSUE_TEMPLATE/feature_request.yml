name: 功能建议
description: 提议新工具、改进现有功能或体验优化
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎建议！请说明使用场景，方便评估优先级。

  - type: dropdown
    id: category
    attributes:
      label: 类型
      options:
        - 新工具
        - 现有工具功能增强
        - UI / 体验优化
        - 文档 / 部署
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 当前痛点或使用场景
      placeholder: 例如：经常需要批量转换多个文件，目前只能一个个上传
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的方案（可选）
      description: 若有具体想法可描述；没有也可以只写需求
      placeholder: 例如：支持多文件上传，转换后打包下载

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 你是否考虑过其他实现方式或已有工具？

  - type: checkboxes
    id: willing
    attributes:
      label: 参与意愿（可选）
      options:
        - label: 我愿意协助测试或提供样本文件
        - label: 我愿意参与实现（PR）
